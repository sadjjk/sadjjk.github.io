            <article>
              <p><strong>这是一场漫长的一个人的搏斗</strong><br>
<strong>没有人知道他是否会倒下</strong>，<br>
<strong>一次懒惰都足以击垮他</strong></p>
<p>柯达直到破产那天，<br>
生产的胶卷质量都是很好的。<br>
只是世界不再需要它了。<br>
离开，<br>
有时候并不是做错了什么，<br>
只是不再被需要了。</p>
