<p>梅森算法(Mersenne Twister)是现最流行的伪随机数发生器之一</p>
<p>使用到了梅森素数 因此得名</p>
<p>此算法是Makoto Matsumoto和Takuji Nishimura 于1997年开发的</p>
<p>基于有限二进制字段上的矩阵线性再生</p>
<p>可以快速产生高质量的伪随机数</p>
<p>是诸多语言 如:R,Python,Ruby,PHP,Matlab的默认伪随机数产生器</p>
<p>Python的标准库Random的random()函数使用的就是Mersenne Twister算法</p>
<p><a href="https://github.com/python/cpython/blob/3.7/Lib/random.py">Random源码</a></p>
<pre><code class="language-python">&quot;&quot;&quot;
General notes on the underlying Mersenne Twister core generator:
* The period is 2**19937-1.
* It is one of the most extensively tested generators in existence.
* The random() method is implemented in C, executes in a single Python step,
  and is, therefore, threadsafe.
&quot;&quot;&quot;
</code></pre>
<p>Numpy的random()函数也加入了Mersenne Twister算法</p>
<p><a href="https://github.com/numpy/numpy/blob/7ccf0e08917d27bc0eba34013c1822b00a66ca6d/numpy/random/mtrand/randomkit.c">Numpy源码</a>是使用写C的 第208行</p>
<pre><code class="language-c">/* Magic Mersenne Twister constants */
#define N 624
#define M 397
#define MATRIX_A 0x9908b0dfUL
#define UPPER_MASK 0x80000000UL
#define LOWER_MASK 0x7fffffffUL

/*
 * Slightly optimised reference implementation of the Mersenne Twister
 * Note that regardless of the precision of long, only 32 bit random
 * integers are produced
 */
</code></pre>
`
