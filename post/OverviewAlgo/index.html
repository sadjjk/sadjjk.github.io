<p>只从单一指标出发评价</p>
<p>会显得很不公正也不科学</p>
<p>因此多数情况下</p>
<p>评价一个事物往往需要涉及多个层次、多个方面的指标</p>
<p>进行综合评价 从而得出更加科学合理的结论</p>
